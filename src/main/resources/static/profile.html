<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch - Profile</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="home-page profile-page">

    <nav id="navbar">
        <div class="nav-logo" onclick="window.location.href='/home.html'">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="23 7 16 12 23 17 23 7" />
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
            </svg>
            CineMatch
        </div>
        <div class="nav-links">
            <span id="welcome-name"></span>
            <a href="home.html">Home</a>
            <a href="recommendations.html">For You</a>
            <a href="watchlist.html">Watchlist</a>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="profile-hero">
        <div id="profile-avatar"></div>
        <div id="profile-info">
            <h1 id="profile-name"></h1>
            <p id="profile-email"></p>
            <p id="profile-member-since"></p>
        </div>
    </div>

    <div id="profile-container">

        <div id="profile-stats">
            <div class="stat-card">
                <h3 id="stat-ratings">—</h3>
                <p>Movies Rated</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-watchlist">—</h3>
                <p>Watchlist</p>
            </div>
        </div>

        <div id="profile-genres">
            <h2>Favourite Genres</h2>
            <div id="genres-list"></div>
        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
