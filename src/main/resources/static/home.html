<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CineMatch - Home</title>
	<link rel="icon" href="data:,">
	<link rel="stylesheet" href="css/style.css">
</head>

<body class="home-page">

	<!-- NAVBAR -->
	<nav id="navbar">
		<div class="nav-logo" onclick="window.location.href='/home.html'">
			<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2"
				stroke-linecap="round" stroke-linejoin="round">
				<polygon points="23 7 16 12 23 17 23 7" />
				<rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
			</svg>
			CineMatch
		</div>
		<div class="nav-search">
			<input type="text" id="search-input" placeholder="Search movies...">
			<button onclick="searchMovies()">Search</button>
		</div>
		<div class="nav-links">
			<span id="welcome-name"></span>
			<a href="recommendations.html">For You</a>
			<a href="watchlist.html">Watchlist</a>
			<a href="profile.html">Profile</a>
			<button onclick="logout()">Logout</button>
		</div>
	</nav>

	<!-- GENRE FILTER -->
	<div id="genre-filter">
	    <button class="genre-btn active" onclick="filterByGenre(null, this)">All</button>
	</div>

	<!-- MOVIES GRID -->
	<div id="movies-grid"></div>

	<!-- NO RESULTS -->
	<div id="no-results" style="display:none;">
		<p>No movies found.</p>
	</div>

	<script src="js/api.js"></script>
	<script src="js/home.js"></script>

</body>

</html>
