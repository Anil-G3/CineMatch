<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch - Register</title>
	<link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-wrapper">

            <div class="auth-image"></div>

            <div class="auth-box">
				<h1 class="logo">
				  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;">
				    <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
				  </svg>CineMatch</h1>
                <p class="tagline">Find your next favorite film</p>

                <h2>Create Account</h2>

                <div id="error-msg" class="error-msg"></div>
                <div id="success-msg" class="success-msg"></div>

                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <div class="input-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></div>
                        <input type="text" id="name" placeholder="Enter your name">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <div class="input-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                        <input type="email" id="email" placeholder="Enter your email">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
					<div class="input-wrapper">
					    <div class="input-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
					    <input type="password" id="password" placeholder="Enter your password">
					    <div class="input-icon right" onclick="togglePassword(this)" style="cursor:pointer;">
					        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
					    </div>
					</div>

                <button onclick="register()" class="btn-primary">Create Account</button>

                <p class="switch-link">Already have an account?
                    <a href="login.html">Sign in here</a>
                </p>
            </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
